{% set name = "spherical" %}
{% set version = "1.0.18" %}
{% set sha256 = "cd1ea04957e50fa35105d2a019080d9475a09187fab70c386f459b19d1edbfa4" %}
{% set python_min = "3.10" %}

# See https://conda-forge.org/docs/maintainer/knowledge_base/#noarch-python for the reason we
# *can* set `python_min` here and https://github.com/conda-forge/cfep/blob/main/cfep-25.md
# for what `python_min` actually means.  I have to do this because conda-forge still supports
# python 3.9, but sxs only supports >=3.10.

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip >=20.0.2
    - hatchling
  run:
    - python >={{ python_min }}
    - numpy
    - scipy
    - numba
    - quaternionic >=1.0

test:
  requires:
    - python {{ python_min }}
  imports:
    - spherical

about:
  home: https://github.com/moble/spherical
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Evaluate and transform D matrices, 3-j symbols, and (scalar or spin-weighted) spherical harmonics
  description: |
    This package provides efficient, accurate, and numerically stable code to compute various
    spherical functions and related quantities.  The code is written in pure python, but is
    automatically compiled with numba for greater efficiency.
  dev_url: https://github.com/moble/spherical
  doc_url: https://spherical.readthedocs.io/

extra:
  recipe-maintainers:
    - moble
